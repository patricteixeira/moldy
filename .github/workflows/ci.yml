name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  release-contract:
    name: Contrato de release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validar versão, changelog, licenças e arquivos públicos
        run: python tools/release_check.py
      - name: Testar utilitários de release e CI
        run: python -m unittest discover -s tools/tests -p "test_*.py"

  web:
    name: App web (apps/web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Instalar dependências travadas
        run: npm ci
      - name: Tipos, testes e build
        run: |
          npm run typecheck
          npm test
          npm run build
      - name: Auditoria de vulnerabilidades
        run: npm audit --audit-level=high

  api:
    name: API Python (apps/api)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: brandrt
          POSTGRES_USER: brandrt
          POSTGRES_PASSWORD: brandrt
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U brandrt -d brandrt"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            packages/engine/requirements-lock.txt
            apps/api/requirements-lock.txt
      - name: Instalar dependências travadas
        run: |
          python -m pip install -r packages/engine/requirements-lock.txt
          python -m pip install -r apps/api/requirements-lock.txt
          python -m pip install --no-deps -e packages/engine -e apps/api
          python -m pip check
      - name: Formatação (ruff)
        run: python -m ruff format --check apps/api
      - name: Lint (ruff)
        run: python -m ruff check apps/api
      - name: Testes com Postgres real
        env:
          BRANDRT_TEST_DATABASE_URL: postgresql+psycopg://brandrt:brandrt@127.0.0.1:5433/brandrt
        run: python -m pytest apps/api -q
      - name: Auditoria de vulnerabilidades
        run: |
          python -m pip install pip-audit==2.10.1
          python tools/run_pip_audit.py -r apps/api/requirements-lock.txt --no-deps

  engine:
    name: Motor Python (packages/engine)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/engine
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/engine/requirements-lock.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/render/package-lock.json
      - name: Instalar e validar o renderer
        working-directory: packages/render
        run: |
          npm ci
          npm run check
          npm run typecheck
          npm test
          npm run build
          npm audit --audit-level=high
      - name: Instalar dependências
        run: |
          python -m pip install -r requirements-lock.txt
          python -m pip install --no-deps -e .
          python -m playwright install --with-deps chromium
      - name: Formatação (ruff)
        run: python -m ruff format --check .
      - name: Lint (ruff)
        run: python -m ruff check .
      - name: Testes
        env:
          BRANDRT_REQUIRE_RENDER_TESTS: "1"
        run: python -m pytest -q
      - name: Auditoria de vulnerabilidades
        run: |
          python -m pip install pip-audit==2.10.1
          python ../../tools/run_pip_audit.py -r requirements-lock.txt --no-deps

  adapter-sdk:
    name: SDK de adapters (packages/adapter-sdk-python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/adapter-sdk-python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/engine/requirements-lock.txt
      - name: Instalar contrato real e ferramentas travadas
        run: |
          python -m pip install -r ../../packages/engine/requirements-lock.txt
          python -m pip install build==1.5.0
          python -m pip install --no-deps -e ../../packages/engine -e .
          python -m pip check
      - name: Formatação (ruff)
        run: python -m ruff format --check .
      - name: Lint (ruff)
        run: python -m ruff check .
      - name: Testes
        run: python -m pytest -q
      - name: Construir e verificar os pacotes públicos
        run: |
          python -m build
          python -m pip install --force-reinstall dist/*.whl
          brandrt-adapter-dtcg --help

  compose-smoke:
    name: Stack Docker (smoke)
    needs: [release-contract, web, api, engine, adapter-sdk]
    runs-on: ubuntu-latest
    env:
      BRANDRT_TOKEN: release-ci-token
      BRANDRT_DB_PASSWORD: release-ci-password
    steps:
      - uses: actions/checkout@v6
      - name: Validar e construir a distribuição self-hosted
        run: |
          docker compose config --quiet
          docker compose build
      - name: Instalar scanner de containers verificado
        env:
          TRIVY_VERSION: 0.72.0
          TRIVY_LINUX_SHA256: bbb64b9695866ce4a7a8f5c9592002c5961cab378577fa3f8a040df362b9b2ea
        run: |
          archive="$RUNNER_TEMP/trivy.tar.gz"
          curl --fail --show-error --location \
            --output "$archive" \
            "https://github.com/aquasecurity/trivy/releases/download/v$TRIVY_VERSION/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          echo "$TRIVY_LINUX_SHA256  $archive" | sha256sum --check
          tar -xzf "$archive" -C "$RUNNER_TEMP" trivy
          "$RUNNER_TEMP/trivy" --version
      - name: Subir a stack e provar as fronteiras públicas
        run: |
          docker compose up -d --wait --wait-timeout 240
          curl --fail --show-error --retry 10 --retry-delay 2 http://127.0.0.1:8080/healthz
          curl --fail --show-error --retry 10 --retry-delay 2 http://127.0.0.1:8080/v1/ping
          curl --fail --show-error --retry 10 --retry-delay 2 http://127.0.0.1:8080/
          docker compose ps
      - name: Recusar CVEs corrigíveis High ou Critical nas imagens em execução
        run: |
          for service in api worker web font-fetch; do
            container_id="$(docker compose ps -q "$service")"
            image_ref="$(docker inspect --format '{{.Config.Image}}' "$container_id")"
            "$RUNNER_TEMP/trivy" image \
              --scanners vuln \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --exit-code 1 \
              --no-progress \
              "$image_ref"
          done
      - name: Provar retomada do banco e re-resolução da API
        run: |
          postgres_id="$(docker compose ps -q postgres)"
          test "$(docker inspect --format '{{.HostConfig.RestartPolicy.Name}}' "$postgres_id")" = "unless-stopped"
          docker compose up -d --force-recreate --wait --wait-timeout 240 api
          curl --fail --show-error --retry 20 --retry-all-errors --retry-delay 2 http://127.0.0.1:8080/v1/ping
      - name: Expor logs em caso de falha
        if: failure()
        run: docker compose logs --no-color
      - name: Encerrar a stack efêmera
        if: always()
        run: docker compose down -v --remove-orphans
