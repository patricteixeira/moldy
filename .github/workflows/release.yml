name: Publicar release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Versão SemVer sem o prefixo v
        required: true
        default: 0.1.0
        type: string
      confirm_license_review:
        description: Confirmo que a decisão de licenças foi revisada pelo mantenedor
        required: true
        default: false
        type: boolean
      confirm_known_limits:
        description: Confirmo o escopo e os limites documentados desta release
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  checks: read

concurrency:
  group: public-release
  cancel-in-progress: false

jobs:
  release:
    name: Validar, empacotar e publicar
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      GH_TOKEN: ${{ github.token }}
      BRANDRT_TOKEN: release-e2e-token
      BRANDRT_DB_PASSWORD: release-e2e-password
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Exigir confirmações humanas do corte
        env:
          LICENSE_REVIEWED: ${{ inputs.confirm_license_review }}
          LIMITS_REVIEWED: ${{ inputs.confirm_known_limits }}
        run: |
          test "$LICENSE_REVIEWED" = "true" || { echo "A revisão de licenças não foi confirmada."; exit 1; }
          test "$LIMITS_REVIEWED" = "true" || { echo "Os limites conhecidos não foram confirmados."; exit 1; }

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/engine/requirements-lock.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Validar o contrato da versão
        run: python tools/release_check.py --version "$VERSION"

      - name: Recusar tag existente
        run: |
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "A tag v$VERSION já existe. Releases são imutáveis."
            exit 1
          fi

      - name: Exigir CI e CodeQL verdes no commit de main
        env:
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: python tools/verify_release_checks.py

      - name: Preparar o validador local do E2E
        run: |
          python -m pip install -r packages/engine/requirements-lock.txt
          python -m pip install --no-deps -e packages/engine
          npm ci --prefix apps/web
          (cd apps/web && npx playwright install --with-deps chromium)

      - name: Construir e subir a distribuição self-hosted
        run: |
          docker compose config --quiet
          docker compose build
          docker compose up -d --wait --wait-timeout 240

      - name: Executar o fluxo real de instalação e exportação
        run: ENGINE_PYTHON="$(command -v python)" npm --prefix apps/web run e2e

      - name: Expor logs em caso de falha
        if: failure()
        run: docker compose logs --no-color

      - name: Encerrar a stack efêmera
        if: always()
        run: docker compose down -v --remove-orphans

      - name: Construir os artefatos públicos
        run: |
          python -m pip install build==1.5.0
          mkdir -p release-dist/schema-bundle
          python -m build --outdir release-dist packages/adapter-sdk-python
          cp -R schemas release-dist/schema-bundle/schemas
          cp -R examples release-dist/schema-bundle/examples
          cp README.md release-dist/schema-bundle/README.md
          (cd release-dist/schema-bundle && zip -qr "../molda-schemas-$VERSION.zip" .)
          rm -rf release-dist/schema-bundle
          (cd release-dist && sha256sum *.whl *.tar.gz *.zip > SHA256SUMS)

      - name: Criar tag e GitHub Release somente após todos os gates
        env:
          NOTES_FILE: docs/releases/v${{ inputs.version }}.md
        run: |
          gh release create "v$VERSION" \
            --target "$GITHUB_SHA" \
            --title "Molda v$VERSION" \
            --notes-file "$NOTES_FILE" \
            release-dist/*
