name: brand-runtime

services:
  data-init:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    user: "0:0"
    command: ["chown", "10001:10001", "/data"]
    volumes:
      - data:/data
    network_mode: none
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN

  postgres:
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    restart: unless-stopped
    environment:
      POSTGRES_USER: brandrt
      POSTGRES_PASSWORD: ${BRANDRT_DB_PASSWORD:?Defina BRANDRT_DB_PASSWORD em .env ou no ambiente}
      POSTGRES_DB: brandrt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brandrt -d brandrt"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - backend

  font-fetch:
    build:
      context: .
      dockerfile: infra/docker/font-fetch.Dockerfile
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: on-failure
    user: "101:101"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m,uid=101,gid=101
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - font-fetch
      - font-egress

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      BRANDRT_DATABASE_URL: postgresql+psycopg://brandrt:${BRANDRT_DB_PASSWORD:?Defina BRANDRT_DB_PASSWORD em .env ou no ambiente}@postgres:5432/brandrt
      BRANDRT_DATA_DIR: /data
      BRANDRT_BOOTSTRAP_TOKEN: ${BRANDRT_TOKEN:-brandrt-dev}
      BRANDRT_FONT_FETCH_BASE_URL: http://font-fetch:8081/google-fonts/
      BRANDRT_TRANSLATION_MODEL_DIR: /opt/brandrt/translation/en-pb
    volumes:
      - data:/data
    depends_on:
      data-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      font-fetch:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: on-failure
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - backend
      - font-fetch

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      BRANDRT_DATABASE_URL: postgresql+psycopg://brandrt:${BRANDRT_DB_PASSWORD:?Defina BRANDRT_DB_PASSWORD em .env ou no ambiente}@postgres:5432/brandrt
      BRANDRT_DATA_DIR: /data
      BRANDRT_RENDER_DIST: /app/render-dist
    volumes:
      - data:/data
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: on-failure
    read_only: true
    shm_size: 1gb
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=1g
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - backend

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        VITE_SYNAPSIS_FONT_BASE_URL: ${VITE_SYNAPSIS_FONT_BASE_URL:-}
    environment:
      BRANDRT_API_TOKEN: ${BRANDRT_TOKEN:-brandrt-dev}
      NGINX_ENVSUBST_FILTER: ^BRANDRT_API_TOKEN$
    ports:
      - "${BRANDRT_BIND_HOST:-127.0.0.1}:${BRANDRT_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: on-failure
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
      - edge

volumes:
  pgdata:
  data:

networks:
  backend:
    internal: true
  font-fetch:
    internal: true
  font-egress:
  edge:
